<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deserted Outlaws</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:'Oswald',sans-serif;
background:#000;
color:white;
overflow-x:hidden;
}

.hero{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.7)),
url('hero.jpg');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.hero-content img{
width:500px;
max-width:90%;
margin-bottom:20px;
}

.hero h1{
font-size:7rem;
letter-spacing:8px;
}

.hero p{
font-size:2rem;
color:#f8c26b;
margin:20px 0;
}

.btn{
display:inline-block;
padding:15px 35px;
background:#f8c26b;
color:black;
text-decoration:none;
font-weight:bold;
margin:10px;
border-radius:50px;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

.section-title{
text-align:center;
font-size:4rem;
padding:100px 20px 50px;
}

.character{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:50px;
gap:50px;
background:#111;
}

.character:nth-child(even){
background:#1a1a1a;
}

.character img{
width:450px;
max-width:100%;
border-radius:20px;
}

.character-text{
max-width:600px;
}

.character-text h2{
font-size:4rem;
color:#f8c26b;
}

.character-text h3{
font-size:2rem;
margin-bottom:20px;
}

.character-text p{
font-size:1.2rem;
line-height:1.8;
}

.world{
padding:120px 10%;
text-align:center;
background:url('desert-bg.jpg');
background-size:cover;
background-position:center;
}

.world h2{
font-size:5rem;
margin-bottom:20px;
}

.world p{
font-size:1.5rem;
max-width:1000px;
margin:auto;
}

.features{
padding:120px 10%;
background:black;
}

.feature-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
margin-top:50px;
}

.feature{
background:#161616;
padding:30px;
border-radius:15px;
}

.feature h3{
color:#f8c26b;
margin-bottom:10px;
}

.gallery{
padding:120px 5%;
background:#111;
}

.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:15px;
}

.gallery-grid img{
width:100%;
height:300px;
object-fit:cover;
border-radius:15px;
}

.footer{
height:60vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
flex-direction:column;
background:linear-gradient(#111,#000);
}

.footer h2{
font-size:5rem;
}

.footer p{
font-size:2rem;
color:#f8c26b;
margin:20px 0;
}

@media(max-width:900px){

.character{
flex-direction:column;
text-align:center;
}

.hero h1{
font-size:4rem;
}

.section-title{
font-size:3rem;
}

.character-text h2{
font-size:3rem;
}

}

</style>

</head>
<body>

<section class="hero">

<div class="hero-content">

<img src="logo.png" alt="Deserted Outlaws Logo">

<h1>DESERTED OUTLAWS</h1>

<p>COMING 2027</p>

<a href="#" class="btn">WATCH TRAILER</a>
<a href="#" class="btn">WISHLIST</a>

</div>

<section class="characters">

<h1>MEET THE OUTLAWS</h1>

<div class="slider">

<button id="prev">&#10094;</button>

<div class="slide-content">
<h2 id="name"></h2>
<h3 id="nickname"></h3>
<p id="description"></p>
</div>

<button id="next">&#10095;</button>

</div>

<div class="dots">
<span class="dot active"></span>
<span class="dot"></span>
<span class="dot"></span>
<span class="dot"></span>
<span class="dot"></span>
</div>

</section>

<style>

.characters{
padding:120px 20px;
background:#111;
text-align:center;
color:white;
font-family:Arial,sans-serif;
}

.characters h1{
font-size:4rem;
margin-bottom:60px;
color:#f8c26b;
letter-spacing:3px;
}

.slider{
display:flex;
justify-content:center;
align-items:center;
gap:40px;
max-width:1200px;
margin:auto;
}

.slide-content{
max-width:800px;
padding:40px;
background:#1b1b1b;
border-radius:20px;
border:2px solid #f8c26b;
}

.slide-content h2{
font-size:3rem;
margin-bottom:10px;
color:#f8c26b;
}

.slide-content h3{
font-size:1.8rem;
margin-bottom:25px;
}

.slide-content p{
font-size:1.2rem;
line-height:1.8;
}

.slider button{
background:none;
border:none;
font-size:4rem;
color:#f8c26b;
cursor:pointer;
transition:0.3s;
}

.slider button:hover{
transform:scale(1.2);
}

.dots{
margin-top:40px;
}

.dot{
height:14px;
width:14px;
background:#444;
display:inline-block;
border-radius:50%;
margin:0 6px;
}

.dot.active{
background:#f8c26b;
}

</style>

<script>

const characters = [

{
name:"Lila Kane",
nickname:"'Viper'",
description:"The central gunslinger. A sharp-tongued, deadly accurate bounty hunter with a mysterious past. Wields dual revolvers and never misses. Cool, confident, and always one step ahead of the law."
},

{
name:"Silas Crowe",
nickname:"'Ghost'",
description:"A hardened, scarred outlaw leader. Former sheriff turned renegade. Carries a lever-action rifle and a grudge the size of the desert. Quiet, ruthless, and respected — and feared — by every gang in the badlands."
},

{
name:"Rosa Delgado",
nickname:"'Bandit Queen'",
description:"A charismatic blonde outlaw known for robbing stagecoaches and banks. Clever, seductive, and fast with a knife or pistol. Always seems to have a wanted poster in her hand — sometimes her own."
},

{
name:"Jax Ryder",
nickname:"'Iron Horse'",
description:"A wild ex-cavalry rider turned motorcycle gunslinger. Rides a customized black desert chopper through dust storms. Explosive temper and loves dynamite almost as much as speed."
},

{
name:"Elias Black",
nickname:"'Coyote'",
description:"A lone-wolf tracker and bounty hunter. Speaks little, but his coyote companion does the talking with its howl. Expert in desert survival and silent takedowns."
}

];

let current = 0;

const name = document.getElementById("name");
const nickname = document.getElementById("nickname");
const description = document.getElementById("description");
const dots = document.querySelectorAll(".dot");

function updateCharacter(){

name.textContent = characters[current].name;
nickname.textContent = characters[current].nickname;
description.textContent = characters[current].description;

dots.forEach(dot => dot.classList.remove("active"));
dots[current].classList.add("active");

}

document.getElementById("next").addEventListener("click", () => {
current++;
if(current >= characters.length){
current = 0;
}
updateCharacter();
});

document.getElementById("prev").addEventListener("click", () => {
current--;
if(current < 0){
current = characters.length - 1;
}
updateCharacter();
});

updateCharacter();

</script>
</section>

<section class="footer">

<h2>DESERTED OUTLAWS</h2>

<p>COMING 2027</p>

<a href="#" class="btn">WISHLIST SOON.</a>

</section>

</body>
</html>
